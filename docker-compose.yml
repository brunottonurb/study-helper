services:
  study-helper:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/prisma.db"
      AUTH_TRUST_HOST: "true"
      AUTH_SECRET: "JvgEJZrqUfFqoKmZuvHkOtosSg3TCVQWxTFyxNllsDeg"
    volumes:
      - study-helper-db:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backup:
    image: alpine
    volumes:
      - study-helper-db:/app/data
      - ./backups:/backups
    command: sh -c "mkdir -p /backups && while true; do cp /app/data/prisma.db /backups/prisma-$(date +\%Y\%m\%d-\%H\%M\%S).db; sleep 86400; done"
    restart: unless-stopped
    depends_on:
      - study-helper

volumes:
  study-helper-db:
    driver: local
